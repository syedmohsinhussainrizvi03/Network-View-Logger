name: network_log_viewer
description: "Flutter package to log REST APIs, GraphQL (queries, variables, responses), and SDK events (Insider, Adjust, Amplitude) with an in-app viewer."
version: 1.0.1
homepage: https://github.com/mohsinrizvi/networklogger
repository: https://github.com/mohsinrizvi/networklogger
issue_tracker: https://github.com/mohsinrizvi/networklogger/issues
topics:
  - flutter
  - logging
  - graphql
  - rest
  - analytics

environment:
  sdk: ^3.10.7
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  gql: ^1.0.0
  gql_exec: ^1.0.0
  gql_http_link: ^1.2.0
  gql_link: ^1.1.0
  graphql: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

